name: GitLab 프로젝트 동기화 (Backend)
on:
  push:
    branches: '**'
  pull_request:
    branches: '**'

  workflow_dispatch:

jobs:
  push-to-gitlab:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 원격 저장소 설정
        env:
          gitlab_url: ${{ secrets.TARGET_URL }}
          gitlab_token_name: ${{ secrets.TARGET_TOKEN_NAME }}
          gitlab_token: ${{ secrets.TARGET_TOKEN }}
        run: |
          git remote add gitlab https://${gitlab_token_name}:${gitlab_token}@${gitlab_url#https://};
      - name: Gitlab의 backend 브랜치로 강제 푸시
        run: |
          git push -f gitlab HEAD:backend
          git push -f --tags gitlab
